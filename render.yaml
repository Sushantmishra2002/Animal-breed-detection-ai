# Render Deployment Configuration
# Deploy both backend and frontend on Render.com

services:
  # Backend API Service
  - type: web
    name: breed-detection-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: LOG_LEVEL
        value: info
    domains:
      - breed-detection-api.onrender.com

  # Frontend Static Site
  - type: static
    name: breed-detection-app
    staticPublishPath: build
    buildCommand: cd frontend && npm install && npm run build
    envVars:
      - key: REACT_APP_API_URL
        value: https://breed-detection-api.onrender.com
    domains:
      - breed-detection-app.onrender.com
